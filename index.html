<script type="text/babel">
const { useState, useEffect, useReducer, useCallback } = React;

const STORE_KEY = 'autito_v1';
const load = () => { try { return JSON.parse(localStorage.getItem(STORE_KEY)); } catch { return null; } };
const save = d => localStorage.setItem(STORE_KEY, JSON.stringify(d));
// OJO: usar componentes locales, no toISOString() (que es UTC) — de noche en
// husos horarios negativos (ej. Argentina, UTC-3) la fecha UTC ya es el día siguiente.
const todayStr = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
};

// ── Supabase: Auth + datos en la nube (vehicles/history/workshop_entries/documents) ──
const supabase = window.supabase.createClient(
  'https://iiggstwvqbnhpfndgdol.supabase.co',
  'sb_publishable_zfRqJm0TvdfinAt-KbrL-Q_n0RTcRLX',
  { global: { fetch: (url, opts) => fetch(url, { ...opts, cache:'no-store' }) } }
);
const sessionToUser = u => ({ id:u.id, email:u.email, name:u.user_metadata?.name || u.email.split('@')[0] });

const fetchCloudData = async (userId) => {
  const [vehiclesRes, histRes, workshopRes, docsRes] = await Promise.all([
    supabase.from('vehicles').select('*').eq('user_id', userId).order('id'),
    supabase.from('history').select('*').eq('user_id', userId),
    supabase.from('workshop_entries').select('*').eq('user_id', userId),
    supabase.from('documents').select('*').eq('user_id', userId),
  ]);
  const vRows = vehiclesRes.data || [];
  const vehicles = vRows.map(v => ({
    id:v.id, brand:v.brand, model:v.model, year:v.year, plate:v.plate,
    km:v.km, color:v.color, addedDate:v.added_date, maints:v.maints,
  }));
  const fav = vRows.find(v=>v.is_favorite);
  return {
    vehicles,
    hist: (histRes.data||[]).map(h=>({mid:h.mid, vid:h.vehicle_id, km:h.km, date:h.date, product:h.product||''})),
    workshop: (workshopRes.data||[]).map(w=>({id:w.id, vid:w.vehicle_id, date:w.date, place:w.place, person:w.person, phone:w.phone, description:w.description, result:w.result, cost:w.cost, createdAt:w.created_at})),
    docs: (docsRes.data||[]).map(d=>({id:d.id, name:d.name, type:d.type, date:d.date, addedAt:d.added_at})),
    favoriteVehicleId: fav ? fav.id : (vehicles[0]?.id ?? null),
  };
};

// iconId identifica el ícono SVG a usar (sin emojis)
const MAINTS_DEFAULT = [
  { id:1, name:'Cubiertas',           cat:'monthly',  iconId:'tire',    iKm:null,  iDays:30,   trigger:'time', lastKm:null, lastDate:null, lastProduct:'', desc:'Revisión mensual de desgaste, presión y estado visual.', tip:'Presión recomendada: consultar manual del vehículo (generalmente 30-35 PSI).' },
  { id:2, name:'Refrigerante',        cat:'monthly',  iconId:'temp',    iKm:null,  iDays:30,   trigger:'time', lastKm:null, lastDate:null, lastProduct:'', desc:'Control mensual del nivel de líquido refrigerante.',     tip:'Si baja frecuentemente puede indicar una pérdida. Revisá mangueras y radiador.' },
  { id:3, name:'Cambio de aceite',    cat:'service',  iconId:'oil',     iKm:10000, iDays:365,  trigger:'both', lastKm:null, lastDate:null, lastProduct:'', desc:'Cambio de aceite motor. Lo que llegue primero: 10.000 km o 12 meses.',  tip:'Con aceite sintético el intervalo puede extenderse. Verificar con el fabricante.' },
  { id:4, name:'Filtro de aire',      cat:'service',  iconId:'airflt',  iKm:15000, iDays:365,  trigger:'both', lastKm:null, lastDate:null, lastProduct:'', desc:'Reemplazo del filtro de aire cada 15.000 km o 12 meses.',               tip:'Un filtro sucio reduce potencia y aumenta el consumo.' },
  { id:5, name:'Filtro de aceite',    cat:'service',  iconId:'oilflt',  iKm:10000, iDays:365,  trigger:'both', lastKm:null, lastDate:null, lastProduct:'', desc:'Se cambia junto con el aceite de motor.',                               tip:'Siempre cambiar el filtro junto con el aceite.' },
  { id:6, name:'Filtro combustible',  cat:'service',  iconId:'fuel',    iKm:30000, iDays:730,  trigger:'both', lastKm:null, lastDate:null, lastProduct:'', desc:'Reemplazo cada 30.000 km o 2 años.',                                    tip:'Un filtro obstruido puede causar pérdida de potencia.' },
  { id:7, name:'Líquido de frenos',   cat:'service',  iconId:'brake',   iKm:null,  iDays:730,  trigger:'time', lastKm:null, lastDate:null, lastProduct:'', desc:'Cambio cada 2 años. Absorbe humedad con el tiempo.',                    tip:'El líquido degradado puede causar falla de frenos.' },
  { id:8, name:'Bujías',              cat:'service',  iconId:'spark',   iKm:30000, iDays:730,  trigger:'both', lastKm:null, lastDate:null, lastProduct:'', desc:'Reemplazo cada 30.000 km o 2 años (estándar).',                        tip:'Las bujías de iridio o platino duran hasta 100.000 km.' },
  { id:9, name:'Correa distribución', cat:'service',  iconId:'belt',    iKm:80000, iDays:1825, trigger:'both', lastKm:null, lastDate:null, lastProduct:'', desc:'Reemplazo cada 80.000 km o 5 años.',                                   tip:'La rotura puede destruir el motor. No ignorar.' },
];

const initState = () => ({
  user: null, vehicles: [], favoriteVehicleId: null,
  docs: [], hist: [], workshop: [], dashView: 'grid',
});

const daysSince = d => d ? Math.floor((Date.now() - new Date(d).getTime()) / 86400000) : null;

const getStatus = (m, currentKm) => {
  if (!m.lastDate) return { color:'blue', label:'Sin registro', pct:0, health:0, kmLeft:null, daysLeft:null, registered:false };
  const days = daysSince(m.lastDate);
  let pctTime = m.iDays ? Math.min(days / m.iDays, 1) : 0;
  let pctKm   = (m.iKm && m.lastKm != null && currentKm != null)
    ? Math.min(Math.max(currentKm - m.lastKm, 0) / m.iKm, 1) : 0;
  // wear = qué tan gastado está (0=nuevo, 1=vencido)
  const wear = m.trigger==='time' ? pctTime : m.trigger==='km' ? pctKm : Math.max(pctTime, pctKm);
  // health = salud restante (1=recién revisado, 0=vencido) — esto se muestra en la barra
  const health = 1 - wear;
  const kmLeft   = m.iKm && m.lastKm != null && currentKm != null ? Math.max(0, m.iKm-(currentKm-m.lastKm)) : null;
  const daysLeft = m.iDays ? Math.max(0, m.iDays - days) : null;
  let color, label;
  if (wear>=1)        { color='red';   label='Urgente'; }
  else if (wear>=0.8) { color='red';   label='Vencido pronto'; }
  else if (wear>=0.6) { color='amber'; label='Próximo'; }
  else               { color='green'; label='Al día'; }
  return { color, label, pct:wear, health, kmLeft, daysLeft, registered:true };
};

const overallStatus = (maints, km) => {
  const reg = maints.filter(m=>m.lastDate);
  if (!reg.length) return { label:'Sin datos', color:'blue' };
  const ss = reg.map(m=>getStatus(m,km));
  if (ss.some(s=>s.color==='red'))   return { label:'Requiere atención', color:'red' };
  if (ss.some(s=>s.color==='amber')) return { label:'Revisar pronto',    color:'amber' };
  return { label:'Muy bien', color:'green' };
};

// ── Reducer ──────────────────────────────────────────────────────────
const reducer = (s, a) => {
  switch(a.type) {
    case 'LOGIN':   return {...s, user:a.user};
    case 'HYDRATE': return {...s, vehicles:a.vehicles, hist:a.hist, workshop:a.workshop, docs:a.docs, favoriteVehicleId:a.favoriteVehicleId};
    case 'ADD_VEH': {
      const v = {...a.v, id:a.v.id ?? Date.now(), maints:a.v.maints || MAINTS_DEFAULT.map(m=>({...m}))};
      return {...s, vehicles:[...s.vehicles,v], favoriteVehicleId:s.vehicles.length===0?v.id:s.favoriteVehicleId};
    }
    case 'SET_FAV': return {...s, favoriteVehicleId:a.id};
    case 'UPD_KM':  return {...s, vehicles:s.vehicles.map(v=>v.id===a.vid?{...v,km:a.km}:v)};
    case 'UPD_VEH': return {...s, vehicles:s.vehicles.map(v=>v.id===a.vid?{...v,...a.changes}:v)};
    case 'DEL_VEH': {
      const vehicles = s.vehicles.filter(v=>v.id!==a.id);
      const favoriteVehicleId = s.favoriteVehicleId===a.id ? (vehicles[0]?.id ?? null) : s.favoriteVehicleId;
      return {
        ...s, vehicles, favoriteVehicleId,
        hist:s.hist.filter(h=>h.vid!==a.id),
        workshop:(s.workshop||[]).filter(w=>w.vid!==a.id),
      };
    }
    case 'APPLY':   return {
      ...s,
      vehicles:s.vehicles.map(v=>v.id===a.vid?{...v,maints:v.maints.map(m=>m.id===a.mid?{...m,lastKm:a.km,lastDate:a.date,lastProduct:a.product||m.lastProduct||''}:m)}:v),
      hist:[...s.hist,{mid:a.mid,vid:a.vid,km:a.km,date:a.date,product:a.product||''}]
    };
    case 'TOGGLE_CAT': return {
      ...s,
      vehicles:s.vehicles.map(v=>v.id===a.vid?{...v,maints:v.maints.map(m=>m.id===a.mid?{...m,cat:m.cat==='monthly'?'service':'monthly'}:m)}:v)
    };
    case 'UPD_MAINT_INTERVAL': return {
      ...s,
      vehicles:s.vehicles.map(v=>v.id===a.vid?{...v,maints:v.maints.map(m=>m.id===a.mid?{...m,...a.changes}:m)}:v)
    };
    case 'ADD_DOC':  return {...s, docs:[...s.docs,a.doc]};
    case 'DEL_DOC':  return {...s, docs:s.docs.filter(d=>d.id!==a.id)};
    case 'ADD_WORK': return {...s, workshop:[...(s.workshop||[]),a.entry]};
    case 'UPD_WORK': return {...s, workshop:(s.workshop||[]).map(w=>w.id===a.entry.id?a.entry:w)};
    case 'DEL_WORK': return {...s, workshop:(s.workshop||[]).filter(w=>w.id!==a.id)};
    case 'SET_DASH_VIEW': return {...s, dashView:a.view};
    case 'RESET':    return initState();
    default: return s;
  }
};

const cMap = { green:'var(--green)', amber:'var(--amber)', red:'var(--red)', blue:'var(--blue)' };

const Ring = ({pct, size=120, stroke=11, color}) => {
  const r = (size-stroke)/2, c = 2*Math.PI*r;
  const clamped = Math.min(Math.max(pct,0),1);
  return (
    <svg width={size} height={size}>
      <circle cx={size/2} cy={size/2} r={r} stroke="var(--bg-4)" strokeWidth={stroke} fill="none"/>
      <circle cx={size/2} cy={size/2} r={r} stroke={color} strokeWidth={stroke} fill="none" strokeLinecap="round"
        strokeDasharray={c} strokeDashoffset={c*(1-clamped)} transform={`rotate(-90 ${size/2} ${size/2})`}
        style={{transition:'stroke-dashoffset .6s ease', filter:`drop-shadow(0 0 6px ${color}60)`}}/>
    </svg>
  );
};

const Login = ({onLogin}) => {
  const [mode,setMode]=useState('login');
  const [email,setEmail]=useState('');
  const [pass,setPass]=useState('');
  const [name,setName]=useState('');
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState('');
  const [info,setInfo]=useState('');

  const go = async () => {
    if (!email||!pass||loading) return;
    setLoading(true); setError(''); setInfo('');
    if (mode==='register') {
      const { data, error } = await supabase.auth.signUp({ email, password:pass, options:{ data:{ name:name||email.split('@')[0] } } });
      setLoading(false);
      if (error) { setError(error.message); return; }
      if (!data.session) { setInfo('Revisá tu email para confirmar la cuenta antes de ingresar.'); return; }
      onLogin(sessionToUser(data.user));
    } else {
      const { data, error } = await supabase.auth.signInWithPassword({ email, password:pass });
      setLoading(false);
      if (error) { setError(error.message==='Invalid login credentials'?'Email o contraseña incorrectos.':error.message); return; }
      onLogin(sessionToUser(data.user));
    }
  };

  return (
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'24px 20px'}}>
      <div style={{textAlign:'center',marginBottom:36}}>
        <div style={{width:56,height:56,borderRadius:16,background:'var(--accent-dim)',border:'1px solid rgba(46,200,100,.3)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 14px'}}>
          <Icon id="car" size={28} color="var(--green)"/>
        </div>
        <h1 style={{fontFamily:'DM Sans',fontSize:26,fontWeight:800,letterSpacing:'-.02em'}}>Autito Seco</h1>
        <p style={{color:'var(--text-2)',fontSize:14,marginTop:6}}>El historial clínico de tu vehículo</p>
      </div>
      <div style={{background:'var(--bg-2)',border:'1px solid var(--border)',borderRadius:'var(--radius-xl)',padding:'28px 24px',width:'100%',maxWidth:360}}>
        <div style={{display:'flex',background:'var(--bg-3)',borderRadius:'var(--radius-md)',padding:4,marginBottom:22}}>
          {['login','register'].map(m=>(
            <button key={m} onClick={()=>{setMode(m);setError('');setInfo('');}} style={{flex:1,padding:'8px',border:'none',borderRadius:'var(--radius-sm)',background:mode===m?'var(--accent)':'transparent',color:mode===m?'#fff':'var(--text-2)',fontFamily:'Sora,sans-serif',fontSize:13,fontWeight:500,cursor:'pointer',transition:'all .2s'}}>
              {m==='login'?'Ingresar':'Registrarse'}
            </button>
          ))}
        </div>
        {mode==='register'&&<div style={{marginBottom:12}}><label style={{fontSize:12,color:'var(--text-3)',display:'block',marginBottom:5}}>Nombre</label><input value={name} onChange={e=>setName(e.target.value)} placeholder="Tu nombre"/></div>}
        <div style={{marginBottom:12}}><label style={{fontSize:12,color:'var(--text-3)',display:'block',marginBottom:5}}>Email</label><input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="tu@email.com"/></div>
        <div style={{marginBottom:22}}><label style={{fontSize:12,color:'var(--text-3)',display:'block',marginBottom:5}}>Contraseña</label><input type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="••••••••" onKeyDown={e=>e.key==='Enter'&&go()}/></div>
        {error&&<p style={{fontSize:12,color:'var(--red)',marginBottom:14}}>{error}</p>}
        {info&&<p style={{fontSize:12,color:'var(--amber)',marginBottom:14}}>{info}</p>}
        <Btn onClick={go} disabled={!email||!pass||loading} style={{width:'100%',justifyContent:'center'}} sz="lg">
          {loading?'Cargando…':mode==='login'?'Ingresar →':'Crear cuenta →'}
        </Btn>
      </div>
    </div>
  );
};

const MaintDetail = ({m, vehicle, onApply, onBack, onToggleCat, dispatch}) => {
  const s = getStatus(m, vehicle.km);
  const days = daysSince(m.lastDate);
  const [customDate, setCustomDate] = useState(todayStr());
  const [customKm,   setCustomKm]   = useState(vehicle.km ? String(vehicle.km) : '');
  const [product,    setProduct]    = useState(m.lastProduct || '');
  const isToday = customDate === todayStr();
  const isPast  = customDate < todayStr();
  const kmVal   = customKm ? Number(customKm) : vehicle.km;
  const kmHigher = customKm && Number(customKm) > vehicle.km;

  const nextInfo = () => {
    if (!s.registered) return null;
    const parts=[];
    if (s.daysLeft!==null) parts.push(`${s.daysLeft} días`);
    if (s.kmLeft!==null)   parts.push(`${s.kmLeft.toLocaleString('es-AR')} km`);
    if (!parts.length) return null;
    return m.trigger==='both'?`Vence en lo que llegue primero: ${parts.join(' o ')}`:`Vence en: ${parts[0]}`;
  };
  const pctD = s.registered ? Math.min(Math.round(s.health*100),100) : 0;

  const handleApply = () => {
    const isoDate = new Date(customDate+'T12:00:00').toISOString();
    onApply(isoDate, kmVal, product);
  };

  return (
    <div style={{minHeight:'100vh',background:'var(--bg-0)',paddingBottom:90}}>
      <div style={{background:'var(--bg-1)',borderBottom:'1px solid var(--border)',padding:'16px 20px',display:'flex',alignItems:'center',gap:12,position:'sticky',top:0,zIndex:10}}>
        <button onClick={onBack} style={{background:'none',border:'none',color:'var(--text-2)',cursor:'pointer',padding:'0 4px',lineHeight:1,display:'flex'}}><Icon id="back" size={22}/></button>
        <h2 style={{fontSize:17,fontWeight:700}}>{m.name}</h2>
      </div>
      <div style={{padding:'24px 20px'}}>
        <div style={{textAlign:'center',marginBottom:24}}>
          <div style={{width:72,height:72,borderRadius:22,background:'var(--bg-3)',border:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 12px'}}>
            <Icon id={m.iconId||'wrench'} size={36} color="var(--green)"/>
          </div>
          <Badge color={s.color} label={s.label}/>
          <p style={{color:'var(--text-2)',fontSize:13,marginTop:10,lineHeight:1.5}}>{m.desc}</p>
          <button onClick={onToggleCat} style={{marginTop:10,background:'none',border:'none',color:'var(--text-3)',fontSize:11,cursor:'pointer',fontFamily:'DM Sans,sans-serif',textDecoration:'underline',textDecorationStyle:'dotted'}}>
            {m.cat==='monthly'?'Mover a Mantenimiento':'Mover a Controles mensuales'}
          </button>
        </div>

        <div style={{background:'var(--bg-2)',borderRadius:'var(--radius-xl)',padding:'20px 18px',marginBottom:16,border:'1px solid var(--border)'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
            <p style={{fontSize:12,color:'var(--text-3)'}}>{s.registered?'Estado de salud':'Sin registros aún'}</p>
            <p style={{fontFamily:'Space Mono',fontSize:20,fontWeight:700,color:cMap[s.color]}}>{s.registered?`${pctD}%`:'—'}</p>
          </div>
          <div style={{height:12,background:'var(--bg-4)',borderRadius:99,overflow:'hidden',marginBottom:10}}>
            <div style={{height:'100%',width:`${pctD}%`,background:cMap[s.color],borderRadius:99,boxShadow:`0 0 12px ${cMap[s.color]}50`,transition:'width .6s'}}/>
          </div>
          {nextInfo()&&<p style={{fontSize:12,color:s.pct>=0.6?cMap[s.color]:'var(--text-3)'}}>{nextInfo()}</p>}
        </div>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:18}}>
          {[['Último mant.',m.lastDate?new Date(m.lastDate).toLocaleDateString('es-AR'):'—'],['Días desde rev.',days!==null?`${days} días`:'—'],['KM en revisión',m.lastKm!=null?m.lastKm.toLocaleString('es-AR')+' km':'—'],['KM restantes',s.kmLeft!==null?s.kmLeft.toLocaleString('es-AR')+' km':(m.iKm?'Ingresar KM':'N/A')]].map(([l,v])=>(
            <div key={l} style={{background:'var(--bg-2)',border:'1px solid var(--border)',borderRadius:'var(--radius-md)',padding:'12px 14px'}}>
              <p style={{fontSize:11,color:'var(--text-3)',marginBottom:4}}>{l}</p>
              <p style={{fontWeight:700,fontSize:14,fontFamily:'Space Mono'}}>{v}</p>
            </div>
          ))}
        </div>

        {/* Última marca/producto usada */}
        {m.lastProduct&&(
          <div style={{background:'var(--bg-2)',border:'1px solid var(--border)',borderRadius:'var(--radius-md)',padding:'12px 14px',marginBottom:18,display:'flex',alignItems:'center',gap:10}}>
            <Icon id="tag" size={16} color="var(--text-3)"/>
            <div>
              <p style={{fontSize:11,color:'var(--text-3)'}}>Último producto usado</p>
              <p style={{fontSize:13,fontWeight:600,marginTop:2}}>{m.lastProduct}</p>
            </div>
          </div>
        )}

        {m.tip&&<div style={{background:'var(--accent-dim)',border:'1px solid rgba(46,200,100,.15)',borderRadius:'var(--radius-md)',padding:'12px 14px',marginBottom:18}}><p style={{fontSize:12,color:'rgba(100,220,140,.9)',lineHeight:1.5}}>💡 {m.tip}</p></div>}

        <div style={{background:'var(--bg-2)',border:'1px solid var(--border)',borderRadius:'var(--radius-xl)',padding:'20px',marginBottom:12}}>
          <p style={{fontSize:13,fontWeight:700,marginBottom:16}}>Registrar revisión</p>
          <div style={{marginBottom:14}}>
            <label style={{fontSize:12,color:'var(--text-3)',display:'block',marginBottom:6}}>Fecha de la revisión</label>
            <input type="date" value={customDate} max={todayStr()} onChange={e=>setCustomDate(e.target.value)}/>

            {isToday&&<p style={{fontSize:11,color:'var(--green)',marginTop:5}}>✓ Hoy</p>}
          </div>
          <div style={{marginBottom:14}}>
            <label style={{fontSize:12,color:'var(--text-3)',display:'block',marginBottom:6}}>KM al momento de la revisión</label>
            <input type="number" value={customKm} onChange={e=>setCustomKm(e.target.value)} placeholder={vehicle.km?`KM actual: ${Number(vehicle.km).toLocaleString('es-AR')}`:'Ingresá los km'}/>
            {kmHigher&&(
              <div style={{background:'var(--amber-dim)',border:'1px solid rgba(232,200,74,.2)',borderRadius:'var(--radius-md)',padding:'10px 14px',marginTop:8,display:'flex',justifyContent:'space-between',alignItems:'center',gap:10}}>
                <p style={{fontSize:12,color:'var(--amber)',lineHeight:1.4}}>El KM ingresado es mayor al registrado. ¿Actualizás el odómetro también?</p>
                <button onClick={()=>dispatch({type:'UPD_KM',vid:vehicle.id,km:Number(customKm)})} style={{background:'var(--amber)',color:'#060A07',border:'none',borderRadius:'var(--radius-sm)',padding:'6px 12px',fontSize:11,fontWeight:700,cursor:'pointer',fontFamily:'DM Sans,sans-serif',whiteSpace:'nowrap',flexShrink:0}}>Actualizar</button>
              </div>
            )}
          </div>
          <div style={{marginBottom:18}}>
            <label style={{fontSize:12,color:'var(--text-3)',display:'block',marginBottom:6}}>
              Marca / Producto utilizado <span style={{fontWeight:400,opacity:.6}}>(opcional)</span>
            </label>
            <input value={product} onChange={e=>setProduct(e.target.value)} placeholder={m.lastProduct?`Último: ${m.lastProduct}`:'Ej: Castrol 5W30, Prestone, Mann Filter...'}/>
          </div>
          <Btn onClick={handleApply} v="success" sz="lg" style={{width:'100%',justifyContent:'center'}}><Icon id="check" size={16} color="var(--green)"/> Confirmar revisión</Btn>
        </div>
        <p style={{textAlign:'center',fontSize:11,color:'var(--text-3)'}}>Podés ingresar una fecha pasada si te olvidaste de registrarlo</p>
      </div>
    </div>
  );
};

// ── WorkshopForm — DEFINIDO FUERA de Workshop para evitar re-mounts ───
const WF_EMPTY = {date:'',place:'',person:'',phone:'',description:'',result:'',cost:''};
const WorkshopForm = ({initial, title, onSave, onCancel}) => {
  const [f, setF] = useState(() => initial ? {...initial} : {...WF_EMPTY});
  const set = useCallback((k,v) => setF(p=>({...p,[k]:v})), []);
  const valid = f.date && f.place && f.description;
  return (
    <div style={{background:'var(--bg-2)',border:'1px solid var(--border)',borderRadius:'var(--radius-xl)',padding:'20px 18px',marginBottom:20}}>
      <h3 style={{fontSize:16,fontWeight:700,marginBottom:18}}>{title}</h3>
      <div style={{marginBottom:12}}>
        <label style={{fontSize:12,color:'var(--text-3)',display:'block',marginBottom:5}}>Fecha <span style={{color:'var(--red)'}}>*</span></label>
        <input type="date" value={f.date} max={todayStr()} onChange={e=>set('date',e.target.value)}/>
      </div>
      <div style={{marginBottom:12}}>
        <label style={{fontSize:12,color:'var(--text-3)',display:'block',marginBottom:5}}>Lugar / Taller <span style={{color:'var(--red)'}}>*</span></label>
        <input value={f.place} onChange={e=>set('place',e.target.value)} placeholder="Ej: Taller Rodríguez..."/>
      </div>
      <div style={{marginBottom:12}}>
        <label style={{fontSize:12,color:'var(--text-3)',display:'block',marginBottom:5}}>Persona / Mecánico</label>
        <input value={f.person} onChange={e=>set('person',e.target.value)} placeholder="Nombre del responsable"/>
      </div>
      <div style={{marginBottom:12}}>
        <label style={{fontSize:12,color:'var(--text-3)',display:'block',marginBottom:5}}>Teléfono</label>
        <input type="tel" value={f.phone} onChange={e=>set('phone',e.target.value)} placeholder="Ej: 11 4567-8901"/>
      </div>
      <div style={{marginBottom:12}}>
        <label style={{fontSize:12,color:'var(--text-3)',display:'block',marginBottom:5}}>Descripción del trabajo <span style={{color:'var(--red)'}}>*</span></label>
        <textarea rows={3} value={f.description} onChange={e=>set('description',e.target.value)} placeholder="¿Qué se hizo? Ej: Cambio de aceite 5W30, filtro de aceite..."/>
      </div>
      <div style={{marginBottom:12}}>
        <label style={{fontSize:12,color:'var(--text-3)',display:'block',marginBottom:5}}>Resultado / Observaciones</label>
        <textarea rows={2} value={f.result} onChange={e=>set('result',e.target.value)} placeholder="¿Qué encontraron? Observaciones..."/>
      </div>
      <div style={{marginBottom:20}}>
        <label style={{fontSize:12,color:'var(--text-3)',display:'block',marginBottom:5}}>Costo total</label>
        <input type="text" value={f.cost} onChange={e=>set('cost',e.target.value)} placeholder="Ej: 45000"/>
      </div>
      <div style={{display:'flex',gap:10}}>
        <Btn onClick={onCancel} v="ghost" style={{flex:1,justifyContent:'center'}}>Cancelar</Btn>
        <Btn onClick={()=>valid&&onSave(f)} disabled={!valid} style={{flex:1,justifyContent:'center'}}>Guardar</Btn>
      </div>
    </div>
  );
};

// ── Dashboard ─────────────────────────────────────────────────────────
const Dashboard = ({state, dispatch, vehicle, vehicles, onNav}) => {
  const [kmModal,  setKmModal]  = useState(false);
  const [newKm,    setNewKm]    = useState('');
  const [detail,   setDetail]   = useState(null);
  const [vcModal,  setVcModal]  = useState(false); // selector de vehículo
  const view = state.dashView || 'list';

  const ov = overallStatus(vehicle.maints, vehicle.km);
  const carColor = vehicle.color || '#7C6FFF';
  const regMaints = vehicle.maints.filter(m=>m.lastDate);
  const overallHealth = regMaints.length ? Math.min(...regMaints.map(m=>getStatus(m,vehicle.km).health)) : 1;

  const applyMaint = (m, date, km, product) => {
    dispatch({type:'APPLY', vid:vehicle.id, mid:m.id, km, date, product});
    setDetail(null);
  };

  if (detail) {
    const cur = vehicle.maints.find(m=>m.id===detail.id);
    return <MaintDetail m={cur} vehicle={vehicle} dispatch={dispatch}
      onApply={(date,km,product)=>applyMaint(cur,date,km,product)}
      onBack={()=>setDetail(null)}
      onToggleCat={()=>{ dispatch({type:'TOGGLE_CAT',vid:vehicle.id,mid:cur.id}); setDetail(null); }}
    />;
  }

  const CardList = ({m}) => {
    const s=getStatus(m,vehicle.km); const days=daysSince(m.lastDate);
    const sub=()=>{ if(!s.registered)return'Sin registro'; if(s.kmLeft!==null&&s.daysLeft!==null)return`${s.kmLeft.toLocaleString('es-AR')} km · ${s.daysLeft}d`; if(s.kmLeft!==null)return`${s.kmLeft.toLocaleString('es-AR')} km restantes`; if(s.daysLeft!==null)return`${s.daysLeft} días restantes`; return`Hace ${days} días`; };
    return (
      <div onClick={()=>setDetail(m)} style={{background:'var(--bg-2)',border:'1px solid var(--border)',borderRadius:'var(--radius-lg)',padding:'14px 16px',cursor:'pointer',transition:'all .15s'}} onMouseOver={e=>{e.currentTarget.style.background='var(--bg-3)';e.currentTarget.style.borderColor='var(--border-hover)';}} onMouseOut={e=>{e.currentTarget.style.background='var(--bg-2)';e.currentTarget.style.borderColor='var(--border)';}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:38,height:38,borderRadius:11,background:'var(--bg-3)',border:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
              <Icon id={m.iconId||'wrench'} size={20} color={s.registered?(s.color==='green'?'var(--green)':s.color==='amber'?'var(--amber)':'var(--red)'):'var(--text-3)'}/>
            </div>
            <div><p style={{fontWeight:600,fontSize:14}}>{m.name}</p><p style={{fontSize:11,color:s.pct>=0.8?cMap[s.color]:'var(--text-3)',marginTop:2}}>{sub()}</p></div>
          </div>
          <Badge color={s.color} label={s.label}/>
        </div>
        <Bar health={s.registered?s.health:0} color={s.color}/>
      </div>
    );
  };

  const CardGrid = ({m}) => {
    const s=getStatus(m,vehicle.km); const healthD=s.registered?Math.min(Math.round(s.health*100),100):0;
    const sub=()=>{ if(!s.registered)return'Sin datos'; if(s.daysLeft!==null)return`${s.daysLeft}d`; if(s.kmLeft!==null)return`${s.kmLeft.toLocaleString('es-AR')}km`; return`${daysSince(m.lastDate)}d`; };
    const iconColor = s.registered?(s.color==='green'?'var(--green)':s.color==='amber'?'var(--amber)':'var(--red)'):'var(--text-3)';
    return (
      <div onClick={()=>setDetail(m)} style={{background:'var(--bg-2)',border:'1px solid var(--border)',borderRadius:'var(--radius-lg)',padding:'14px 12px',cursor:'pointer',transition:'all .15s',display:'flex',flexDirection:'column',gap:8}} onMouseOver={e=>{e.currentTarget.style.background='var(--bg-3)';e.currentTarget.style.borderColor='var(--border-hover)';}} onMouseOut={e=>{e.currentTarget.style.background='var(--bg-2)';e.currentTarget.style.borderColor='var(--border)';}}>
        <div style={{width:34,height:34,borderRadius:10,background:'var(--bg-3)',border:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'center'}}>
          <Icon id={m.iconId||'wrench'} size={18} color={iconColor}/>
        </div>
        <p style={{fontWeight:600,fontSize:13,lineHeight:1.2}}>{m.name}</p>
        <Bar health={s.registered?s.health:0} color={s.color}/>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{fontSize:10,color:'var(--text-3)'}}>{sub()}</span>
          <Badge color={s.color} label={s.pct>=1?'Urgente':s.pct>=0.6?'Próximo':s.registered?'OK':'—'}/>
        </div>
        {s.registered&&<p style={{fontFamily:'Space Mono',fontSize:13,fontWeight:700,color:cMap[s.color]}}>{healthD}%</p>}
      </div>
    );
  };

  const monthly = vehicle.maints.filter(m=>m.cat==='monthly');
  const service = vehicle.maints.filter(m=>m.cat==='service');
  const isGrid  = view==='grid';
  const cols    = isGrid ? 'repeat(2,1fr)' : '1fr';

  return (
    <div style={{background:'var(--bg-0)',minHeight:'100vh',paddingBottom:80}}>
      {/* Header */}
      <div style={{background:'linear-gradient(180deg,var(--bg-2) 0%,var(--bg-0) 100%)',padding:'28px 20px 20px',borderBottom:'1px solid var(--border)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}}>
          <div>
            <p style={{fontSize:11,color:'var(--text-3)',letterSpacing:'.08em',textTransform:'uppercase',fontWeight:600,marginBottom:6}}>Mi vehículo</p>
            <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
              <h1 style={{fontSize:30,fontWeight:800,letterSpacing:'-.02em',lineHeight:1.05}}>{vehicle.brand} {vehicle.model}</h1>
              {vehicles.length>1&&<button onClick={()=>setVcModal(true)} style={{background:'var(--bg-3)',border:'1px solid var(--border)',borderRadius:6,color:'var(--text-3)',fontSize:11,padding:'2px 7px',cursor:'pointer',fontFamily:'Sora,sans-serif'}}>Cambiar auto ↕</button>}
            </div>
            <p style={{fontSize:13,color:'var(--text-2)',marginTop:6}}>
              <span style={{fontFamily:'Space Mono',background:'var(--bg-3)',padding:'2px 8px',borderRadius:6,fontSize:12,marginRight:8}}>{vehicle.plate.toUpperCase()}</span>
              {vehicle.year}
            </p>
          </div>
        </div>
        <div style={{display:'flex',justifyContent:'center',margin:'12px 0 18px'}}><CarSVG c={carColor}/></div>

        <div style={{display:'grid',gridTemplateColumns:'auto 1fr',gap:14,alignItems:'stretch'}}>
          <div style={{background:'var(--bg-3)',border:'1px solid var(--border)',borderRadius:'var(--radius-xl)',padding:'14px',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
            <div style={{position:'relative',width:96,height:96}}>
              <Ring pct={overallHealth} size={96} stroke={9} color={cMap[ov.color]}/>
              <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
                <p style={{fontFamily:'Space Mono',fontSize:18,fontWeight:800,color:cMap[ov.color]}}>{Math.round(overallHealth*100)}%</p>
              </div>
            </div>
            <p style={{fontSize:11,color:'var(--text-3)',marginTop:8,fontWeight:600,textAlign:'center'}}>{ov.label}</p>
          </div>
          <div style={{background:'var(--bg-3)',border:'1px solid var(--border)',borderRadius:'var(--radius-xl)',padding:'18px 16px',display:'flex',flexDirection:'column',justifyContent:'space-between'}}>
            <div>
              <p style={{fontSize:11,color:'var(--text-3)',marginBottom:4}}>Kilometraje actual</p>
              <p style={{fontFamily:'Space Mono',fontSize:26,fontWeight:800}}>{Number(vehicle.km).toLocaleString('es-AR')}<span style={{fontSize:14,color:'var(--text-3)',fontWeight:500}}> km</span></p>
            </div>
            <Btn onClick={()=>{setNewKm('');setKmModal(true);}} v="ghost" sz="sm" style={{alignSelf:'flex-start',marginTop:10}}>Actualizar</Btn>
          </div>
        </div>
      </div>

      {/* Aviso de ítems vencidos o próximos a vencer */}
      {(() => {
        const due = vehicle.maints.filter(m=>{ const s=getStatus(m,vehicle.km); return s.registered && s.pct>=0.6; })
          .sort((a,b)=>getStatus(b,vehicle.km).pct-getStatus(a,vehicle.km).pct);
        if (!due.length) return null;
        const urgentCount = due.filter(m=>getStatus(m,vehicle.km).pct>=0.8).length;
        return (
          <div style={{margin:'16px 16px 0',background:urgentCount?'var(--red-dim)':'var(--amber-dim)',border:`1px solid ${urgentCount?'rgba(232,90,74,.25)':'rgba(232,200,74,.25)'}`,borderRadius:'var(--radius-lg)',padding:'14px 16px'}}>
            <p style={{fontSize:12,fontWeight:700,color:urgentCount?'var(--red)':'var(--amber)',marginBottom:8}}>
              {urgentCount?`⚠ ${urgentCount} ítem${urgentCount>1?'s':''} requiere${urgentCount>1?'n':''} atención`:`${due.length} ítem${due.length>1?'s':''} próximo${due.length>1?'s':''} a vencer`}
            </p>
            <div style={{display:'flex',flexDirection:'column',gap:6}}>
              {due.slice(0,3).map(m=>(
                <button key={m.id} onClick={()=>setDetail(m)} style={{display:'flex',alignItems:'center',gap:8,background:'none',border:'none',padding:0,cursor:'pointer',textAlign:'left'}}>
                  <Icon id={m.iconId||'wrench'} size={15} color={urgentCount?'var(--red)':'var(--amber)'}/>
                  <span style={{fontSize:12,color:'var(--text-1)',fontWeight:500}}>{m.name}</span>
                </button>
              ))}
            </div>
          </div>
        );
      })()}

      <div style={{padding:'20px 16px'}}>
        {/* Toggle vista Lista / Grilla */}
        <div style={{display:'flex',justifyContent:'flex-end',marginBottom:14}}>
          <div style={{display:'flex',background:'var(--bg-3)',borderRadius:'var(--radius-sm)',padding:3,gap:2}}>
            {[['list','☰ Lista'],['grid','⊞ Grilla']].map(([id,label])=>(
              <button key={id} onClick={()=>dispatch({type:'SET_DASH_VIEW',view:id})} style={{background:view===id?'var(--accent)':'transparent',color:view===id?'#fff':'var(--text-2)',border:'none',borderRadius:'var(--radius-sm)',padding:'5px 12px',fontSize:11,fontWeight:600,cursor:'pointer',fontFamily:'Sora,sans-serif',transition:'all .15s'}}>{label}</button>
            ))}
          </div>
        </div>

        <p style={{fontSize:12,fontWeight:700,color:'var(--text-3)',marginBottom:12,letterSpacing:'.08em',textTransform:'uppercase',paddingLeft:4}}>Controles mensuales</p>
        <div style={{display:'grid',gridTemplateColumns:cols,gap:10,marginBottom:24}}>
          {monthly.map(m=>isGrid?<CardGrid key={m.id} m={m}/>:<CardList key={m.id} m={m}/>)}
        </div>
        <p style={{fontSize:12,fontWeight:700,color:'var(--text-3)',marginBottom:12,letterSpacing:'.08em',textTransform:'uppercase',paddingLeft:4}}>Mantenimiento</p>
        <div style={{display:'grid',gridTemplateColumns:cols,gap:10}}>
          {service.map(m=>isGrid?<CardGrid key={m.id} m={m}/>:<CardList key={m.id} m={m}/>)}
        </div>
      </div>

      {/* Modal KM */}
      {kmModal&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.75)',display:'flex',alignItems:'flex-end',zIndex:100}}>
          <div style={{background:'var(--bg-2)',borderRadius:'var(--radius-xl) var(--radius-xl) 0 0',padding:'28px 24px 40px',width:'100%',border:'1px solid var(--border)'}}>
            <h3 style={{fontSize:18,fontWeight:600,marginBottom:6}}>Actualizar kilometraje</h3>
            <p style={{fontSize:13,color:'var(--text-2)',marginBottom:18}}>Actual: {Number(vehicle.km).toLocaleString('es-AR')} km</p>
            <input type="number" value={newKm} onChange={e=>setNewKm(e.target.value)} placeholder="Nuevo kilometraje" style={{marginBottom:16}} autoFocus/>
            <div style={{display:'flex',gap:10}}>
              <Btn onClick={()=>setKmModal(false)} v="ghost" style={{flex:1,justifyContent:'center'}}>Cancelar</Btn>
              <Btn onClick={()=>{if(Number(newKm)>0){dispatch({type:'UPD_KM',vid:vehicle.id,km:Number(newKm)});setKmModal(false);}}} disabled={!newKm||Number(newKm)<=0} style={{flex:1,justifyContent:'center'}}>Guardar</Btn>
            </div>
          </div>
        </div>
      )}

      {/* Modal selector de vehículo */}
      {vcModal&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.75)',display:'flex',alignItems:'flex-end',zIndex:100}}>
          <div style={{background:'var(--bg-2)',borderRadius:'var(--radius-xl) var(--radius-xl) 0 0',padding:'28px 24px 40px',width:'100%',border:'1px solid var(--border)'}}>
            <h3 style={{fontSize:18,fontWeight:600,marginBottom:18}}>Cambiar vehículo</h3>
            {vehicles.map(v=>{
              const isCur=v.id===vehicle.id;
              return (
                <div key={v.id} onClick={()=>{ dispatch({type:'SET_FAV',id:v.id}); setVcModal(false); }} style={{background:isCur?'var(--accent-dim)':'var(--bg-3)',border:`1px solid ${isCur?'rgba(124,111,255,.35)':'var(--border)'}`,borderRadius:'var(--radius-lg)',padding:'14px 16px',marginBottom:10,cursor:'pointer',display:'flex',alignItems:'center',gap:12}}>
                  <div style={{width:36,height:36,borderRadius:'50%',background:v.color||'#7C6FFF',border:'2px solid rgba(255,255,255,.15)',flexShrink:0}}/>
                  <div style={{flex:1}}>
                    <p style={{fontWeight:600,fontSize:14}}>{v.brand} {v.model}</p>
                    <p style={{fontSize:11,color:'var(--text-3)',marginTop:2}}>{v.plate.toUpperCase()} · {Number(v.km).toLocaleString('es-AR')} km</p>
                  </div>
                  {isCur&&<span style={{color:'var(--accent)',fontSize:13,fontWeight:700}}>Activo</span>}
                </div>
              );
            })}
            <Btn onClick={()=>setVcModal(false)} v="ghost" style={{width:'100%',justifyContent:'center',marginTop:4}}>Cancelar</Btn>
          </div>
        </div>
      )}
    </div>
  );
};

// ── Documents ─────────────────────────────────────────────────────────
const Documents = ({state, dispatch}) => {
  const [adding,setAdding]=useState(false);
  const [f,setF]=useState({name:'',type:'VTV',date:''});
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const types=['VTV','Seguro','Cédula','Factura','Otro'];
  const icons={VTV:'📄',Seguro:'🛡️','Cédula':'🪪',Factura:'🧾',Otro:'📎'};
  const addDoc=()=>{ if(!f.name)return; dispatch({type:'ADD_DOC',doc:{id:Date.now(),...f,addedAt:new Date().toISOString()}}); setF({name:'',type:'VTV',date:''}); setAdding(false); };
  return (
    <div style={{background:'var(--bg-0)',minHeight:'100vh',paddingBottom:80}}>
      <div style={{background:'var(--bg-1)',borderBottom:'1px solid var(--border)',padding:'20px 20px 16px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div><h1 style={{fontSize:20,fontWeight:700}}>Documentación</h1><p style={{fontSize:13,color:'var(--text-2)',marginTop:4}}>Documentos del vehículo</p></div>
        <Btn onClick={()=>setAdding(true)} sz="sm">+ Agregar</Btn>
      </div>
      <div style={{padding:'20px 16px'}}>
        {adding&&(
          <div style={{background:'var(--bg-2)',border:'1px solid var(--accent)',borderRadius:'var(--radius-xl)',padding:'20px 18px',marginBottom:20}}>
            <h3 style={{fontSize:16,fontWeight:600,marginBottom:16}}>Nuevo documento</h3>
            <div style={{marginBottom:12}}><label style={{fontSize:12,color:'var(--text-3)',display:'block',marginBottom:5}}>Tipo</label><select value={f.type} onChange={e=>set('type',e.target.value)}>{types.map(t=><option key={t}>{t}</option>)}</select></div>
            <div style={{marginBottom:12}}><label style={{fontSize:12,color:'var(--text-3)',display:'block',marginBottom:5}}>Descripción</label><input value={f.name} onChange={e=>set('name',e.target.value)} placeholder="Ej: VTV 2025, Póliza Allianz..."/></div>
            <div style={{marginBottom:18}}><label style={{fontSize:12,color:'var(--text-3)',display:'block',marginBottom:5}}>Fecha de vencimiento</label><input type="date" value={f.date} onChange={e=>set('date',e.target.value)}/></div>
            <div style={{display:'flex',gap:10}}>
              <Btn onClick={()=>setAdding(false)} v="ghost" style={{flex:1,justifyContent:'center'}}>Cancelar</Btn>
              <Btn onClick={addDoc} disabled={!f.name} style={{flex:1,justifyContent:'center'}}>Guardar</Btn>
            </div>
          </div>
        )}
        {state.docs.length===0&&!adding?(
          <div style={{textAlign:'center',padding:'60px 20px'}}>
            <div style={{fontSize:48,marginBottom:12}}>📁</div>
            <p style={{fontSize:15,fontWeight:600,marginBottom:8}}>Sin documentos</p>
            <p style={{color:'var(--text-2)',fontSize:13,marginBottom:20}}>Guardá tu VTV, seguro, cédula y más</p>
            <Btn onClick={()=>setAdding(true)}>Agregar documento</Btn>
          </div>
        ):(
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            {state.docs.map(doc=>{
              const expired=doc.date&&new Date(doc.date)<new Date();
              const near=doc.date&&!expired&&(new Date(doc.date)-new Date())<30*864e5;
              return (
                <div key={doc.id} style={{background:'var(--bg-2)',border:`1px solid ${expired?'rgba(255,85,85,.25)':near?'rgba(245,166,35,.25)':'var(--border)'}`,borderRadius:'var(--radius-lg)',padding:'14px 16px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <div style={{display:'flex',gap:12,alignItems:'center'}}>
                    <span style={{fontSize:24}}>{icons[doc.type]}</span>
                    <div>
                      <p style={{fontWeight:600,fontSize:14}}>{doc.name}</p>
                      <p style={{fontSize:11,color:'var(--text-3)',marginTop:2}}>{doc.type}{doc.date&&` · Vence ${new Date(doc.date).toLocaleDateString('es-AR')}`}</p>
                      {expired&&<span style={{fontSize:11,color:'var(--red)',fontWeight:700}}>⚠ Vencido</span>}
                      {near&&!expired&&<span style={{fontSize:11,color:'var(--amber)',fontWeight:700}}>⚠ Vence pronto</span>}
                    </div>
                  </div>
                  <button onClick={()=>dispatch({type:'DEL_DOC',id:doc.id})} style={{background:'none',border:'none',color:'var(--text-3)',cursor:'pointer',fontSize:20,padding:4,lineHeight:1}}>×</button>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
};

// ── Workshop ──────────────────────────────────────────────────────────
const Workshop = ({state, dispatch, vehicle}) => {
  const [mode,  setMode]  = useState('list');
  const [selId, setSelId] = useState(null);
  // Solo mostrar entradas del vehículo activo (o sin vid para retrocompatibilidad)
  const ws = (state.workshop || []).filter(w => !w.vid || w.vid === vehicle.id);
  const fmt = v => isNaN(Number(v)) ? v : `$${Number(v).toLocaleString('es-AR')}`;

  if (mode==='add') return (
    <div style={{background:'var(--bg-0)',minHeight:'100vh',paddingBottom:90}}>
      <div style={{background:'var(--bg-1)',borderBottom:'1px solid var(--border)',padding:'16px 20px',display:'flex',alignItems:'center',gap:12,position:'sticky',top:0,zIndex:10}}>
        <button onClick={()=>setMode('list')} style={{background:'none',border:'none',color:'var(--text-2)',cursor:'pointer',fontSize:22,padding:'0 4px',lineHeight:1}}>←</button>
        <div>
          <h2 style={{fontSize:17,fontWeight:600}}>Nueva visita</h2>
          <p style={{fontSize:11,color:'var(--text-3)',marginTop:1}}>{vehicle.brand} {vehicle.model}</p>
        </div>
      </div>
      <div style={{padding:'20px 16px'}}>
        <WorkshopForm title="Nueva visita al taller" onCancel={()=>setMode('list')}
          onSave={f=>{ dispatch({type:'ADD_WORK',entry:{id:Date.now(),...f,vid:vehicle.id,createdAt:new Date().toISOString()}}); setMode('list'); }}/>
      </div>
    </div>
  );

  if (mode==='edit') {
    const e=ws.find(w=>w.id===selId);
    if (!e) { setMode('list'); return null; }
    return (
      <div style={{background:'var(--bg-0)',minHeight:'100vh',paddingBottom:90}}>
        <div style={{background:'var(--bg-1)',borderBottom:'1px solid var(--border)',padding:'16px 20px',display:'flex',alignItems:'center',gap:12,position:'sticky',top:0,zIndex:10}}>
          <button onClick={()=>setMode('detail')} style={{background:'none',border:'none',color:'var(--text-2)',cursor:'pointer',fontSize:22,padding:'0 4px',lineHeight:1}}>←</button>
          <h2 style={{fontSize:17,fontWeight:600}}>Editar visita</h2>
        </div>
        <div style={{padding:'20px 16px'}}>
          <WorkshopForm key={e.id} title="Editar visita" initial={e} onCancel={()=>setMode('detail')}
            onSave={f=>{ dispatch({type:'UPD_WORK',entry:{...e,...f}}); setMode('detail'); }}/>
        </div>
      </div>
    );
  }

  if (mode==='detail') {
    const e=ws.find(w=>w.id===selId);
    if (!e) { setMode('list'); return null; }
    return (
      <div style={{minHeight:'100vh',background:'var(--bg-0)',paddingBottom:90}}>
        <div style={{background:'var(--bg-1)',borderBottom:'1px solid var(--border)',padding:'16px 20px',display:'flex',alignItems:'center',justifyContent:'space-between',position:'sticky',top:0,zIndex:10}}>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <button onClick={()=>setMode('list')} style={{background:'none',border:'none',color:'var(--text-2)',cursor:'pointer',fontSize:22,padding:'0 4px',lineHeight:1}}>←</button>
            <h2 style={{fontSize:17,fontWeight:600}}>Visita al taller</h2>
          </div>
          <div style={{display:'flex',gap:8}}>
            <button onClick={()=>setMode('edit')} style={{background:'var(--bg-3)',border:'1px solid var(--border)',color:'var(--text-2)',borderRadius:'var(--radius-sm)',padding:'6px 12px',fontSize:12,fontWeight:600,cursor:'pointer',fontFamily:'Sora,sans-serif'}}>✏ Editar</button>
            <button onClick={()=>{ dispatch({type:'DEL_WORK',id:e.id}); setMode('list'); }} style={{background:'var(--red-dim)',border:'1px solid rgba(255,85,85,.2)',color:'var(--red)',borderRadius:'var(--radius-sm)',padding:'6px 12px',fontSize:12,fontWeight:600,cursor:'pointer',fontFamily:'Sora,sans-serif'}}>Eliminar</button>
          </div>
        </div>
        <div style={{padding:'24px 20px'}}>
          {/* Lugar, fecha y contacto */}
          <div style={{background:'var(--bg-2)',border:'1px solid var(--border)',borderRadius:'var(--radius-xl)',padding:'20px',marginBottom:16}}>
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16}}>
              <div style={{width:44,height:44,background:'var(--accent-dim)',border:'1px solid rgba(124,111,255,.25)',borderRadius:'var(--radius-md)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0}}>🔩</div>
              <div>
                <p style={{fontWeight:700,fontSize:16}}>{e.place}</p>
                <p style={{fontSize:13,color:'var(--text-2)',marginTop:2}}>{new Date(e.date+'T12:00:00').toLocaleDateString('es-AR',{day:'2-digit',month:'long',year:'numeric'})}</p>
              </div>
            </div>
            {(e.person||e.phone)&&(
              <div style={{borderTop:'1px solid var(--border)',paddingTop:14}}>
                <p style={{fontSize:11,color:'var(--text-3)',marginBottom:8,fontWeight:600,letterSpacing:'.05em',textTransform:'uppercase'}}>Contacto</p>
                {e.person&&<div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}><span style={{fontSize:16}}>👤</span><span style={{fontSize:14,fontWeight:500}}>{e.person}</span></div>}
                {e.phone&&<div style={{display:'flex',alignItems:'center',gap:8}}><span style={{fontSize:16}}>📞</span><a href={`tel:${e.phone}`} style={{fontSize:14,color:'var(--blue)',fontFamily:'Space Mono',textDecoration:'none',fontWeight:600}}>{e.phone}</a></div>}
              </div>
            )}
          </div>

          {/* Descripción */}
          <div style={{background:'var(--bg-2)',border:'1px solid var(--border)',borderRadius:'var(--radius-xl)',padding:'20px',marginBottom:16}}>
            <p style={{fontSize:11,color:'var(--text-3)',marginBottom:8,fontWeight:600,letterSpacing:'.05em',textTransform:'uppercase'}}>Trabajo realizado</p>
            <p style={{fontSize:14,color:'var(--text-1)',lineHeight:1.6}}>{e.description}</p>
          </div>

          {/* Resultado */}
          {e.result&&<div style={{background:'var(--bg-2)',border:'1px solid var(--border)',borderRadius:'var(--radius-xl)',padding:'20px',marginBottom:16}}><p style={{fontSize:11,color:'var(--text-3)',marginBottom:8,fontWeight:600,letterSpacing:'.05em',textTransform:'uppercase'}}>Resultado / Observaciones</p><p style={{fontSize:14,color:'var(--text-1)',lineHeight:1.6}}>{e.result}</p></div>}

          {/* Costo */}
          {e.cost&&<div style={{background:'var(--green-dim)',border:'1px solid rgba(46,232,154,.15)',borderRadius:'var(--radius-xl)',padding:'20px'}}><p style={{fontSize:11,color:'rgba(46,232,154,.6)',marginBottom:6,fontWeight:600,letterSpacing:'.05em',textTransform:'uppercase'}}>Costo total</p><p style={{fontFamily:'Space Mono',fontSize:26,fontWeight:700,color:'var(--green)'}}>{fmt(e.cost)}</p></div>}
        </div>
      </div>
    );
  }

  // Lista
  return (
    <div style={{background:'var(--bg-0)',minHeight:'100vh',paddingBottom:80}}>
      <div style={{background:'var(--bg-1)',borderBottom:'1px solid var(--border)',padding:'20px 20px 16px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div>
          <h1 style={{fontSize:20,fontWeight:700}}>Taller</h1>
          <p style={{fontSize:13,color:'var(--text-2)',marginTop:4}}>{vehicle.brand} {vehicle.model}</p>
        </div>
        <Btn onClick={()=>setMode('add')} sz="sm">+ Agregar</Btn>
      </div>
      <div style={{padding:'20px 16px'}}>
        {ws.length===0?(
          <div style={{textAlign:'center',padding:'60px 20px'}}>
            <div style={{fontSize:48,marginBottom:12}}>🔧</div>
            <p style={{fontSize:15,fontWeight:600,marginBottom:8}}>Sin visitas registradas</p>
            <p style={{color:'var(--text-2)',fontSize:13,marginBottom:20}}>Registrá cada visita con el mecánico, trabajos y costos</p>
            <Btn onClick={()=>setMode('add')}>Registrar primera visita</Btn>
          </div>
        ):(
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            {[...ws].reverse().map(e=>(
              <div key={e.id} onClick={()=>{ setSelId(e.id); setMode('detail'); }} style={{background:'var(--bg-2)',border:'1px solid var(--border)',borderRadius:'var(--radius-lg)',padding:'16px',cursor:'pointer',transition:'all .15s'}} onMouseOver={ev=>{ev.currentTarget.style.background='var(--bg-3)';ev.currentTarget.style.borderColor='var(--border-hover)';}} onMouseOut={ev=>{ev.currentTarget.style.background='var(--bg-2)';ev.currentTarget.style.borderColor='var(--border)';}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
                  <div style={{display:'flex',gap:12,alignItems:'center'}}>
                    <div style={{width:40,height:40,background:'var(--accent-dim)',border:'1px solid rgba(124,111,255,.2)',borderRadius:'var(--radius-md)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}}>🔩</div>
                    <div>
                      <p style={{fontWeight:700,fontSize:14}}>{e.place}</p>
                      <p style={{fontSize:11,color:'var(--text-3)',marginTop:2}}>{new Date(e.date+'T12:00:00').toLocaleDateString('es-AR',{day:'2-digit',month:'short',year:'numeric'})}{e.person&&` · ${e.person}`}</p>
                    </div>
                  </div>
                  {e.cost&&<span style={{fontFamily:'Space Mono',fontSize:13,fontWeight:700,color:'var(--green)',background:'var(--green-dim)',padding:'3px 8px',borderRadius:6,whiteSpace:'nowrap'}}>{fmt(e.cost)}</span>}
                </div>
                <p style={{fontSize:13,color:'var(--text-2)',lineHeight:1.5,overflow:'hidden',display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical'}}>{e.description}</p>
                {e.phone&&<p style={{fontSize:11,color:'var(--blue)',marginTop:6}}>📞 {e.phone}</p>}
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
};

  { q:'¿Qué significa la barra de porcentaje?', a:'La barra muestra la salud restante del ítem. 100% = recién revisado. A medida que pasan kilómetros o días, baja. Cuando llega a 0% o cambia a rojo, es hora de atenderlo.' },
  { q:'¿Cómo registro una revisión?', a:'Entrá al ítem desde el dashboard, elegí la fecha (puede ser una pasada si te olvidaste de cargarla) y el kilometraje al momento, y tocá "Confirmar revisión". El estado se actualiza automáticamente.' },

  { q:'¿Puedo registrar una revisión con fecha pasada?', a:'Sí. En la pantalla de detalle de cada ítem podés elegir cualquier fecha anterior a hoy. La app muestra cuántos días atrás fue y calcula el estado correctamente desde esa fecha.' },

// ── IntervalsScreen ───────────────────────────────────────────────────
const IntervalsScreen = ({vehicle, dispatch, onBack}) => {
  const [editId, setEditId] = useState(null);

  const MaintRow = ({m}) => {
    const isEditing = editId===m.id;
    const def = MAINTS_DEFAULT.find(x=>x.id===m.id);
    const isCustom = def && (m.iKm!==def.iKm || m.iDays!==def.iDays || m.trigger!==def.trigger);
    const [iKm,  setIKm]  = useState(m.iKm!=null?String(m.iKm):'');
    const [iDays,setIDays]= useState(m.iDays!=null?String(m.iDays):'');
    const [trig, setTrig] = useState(m.trigger);
    const save=()=>{ dispatch({type:'UPD_MAINT_INTERVAL',vid:vehicle.id,mid:m.id,changes:{iKm:iKm?Number(iKm):null,iDays:iDays?Number(iDays):null,trigger:trig}}); setEditId(null); };
    return (
      <div style={{background:'var(--bg-2)',border:`1px solid ${isEditing?'rgba(124,111,255,.3)':'var(--border)'}`,borderRadius:'var(--radius-lg)',marginBottom:10,overflow:'hidden'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'14px 16px'}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <Icon id={m.iconId||'wrench'} size={20} color="var(--green)"/>
            <div>
              <div style={{display:'flex',alignItems:'center',gap:6}}>
                <span style={{fontSize:13,fontWeight:600}}>{m.name}</span>
                {isCustom&&<span style={{fontSize:9,background:'var(--accent-dim)',color:'var(--accent)',padding:'1px 6px',borderRadius:99,fontWeight:700,letterSpacing:'.04em'}}>CUSTOM</span>}
              </div>
              <p style={{fontSize:11,color:'var(--text-3)',marginTop:2}}>
                {m.iKm?`${m.iKm.toLocaleString('es-AR')} km`:''}{m.iKm&&m.iDays?' · ':''}{m.iDays?`${m.iDays} días`:''}
                {!m.iKm&&!m.iDays&&'Sin intervalo'}
              </p>
            </div>
          </div>
          <button onClick={()=>setEditId(isEditing?null:m.id)} style={{background:isEditing?'var(--accent)':'var(--bg-3)',border:'none',borderRadius:'var(--radius-sm)',color:isEditing?'#fff':'var(--text-2)',fontSize:11,fontWeight:600,cursor:'pointer',padding:'5px 12px',fontFamily:'Sora,sans-serif',transition:'all .2s'}}>
            {isEditing?'✕':'Editar'}
          </button>
        </div>
        {isEditing&&(
          <div style={{padding:'0 16px 16px',borderTop:'1px solid var(--border)'}}>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12,marginTop:12}}>
              <div>
                <label style={{fontSize:11,color:'var(--text-3)',display:'block',marginBottom:4}}>Cada N km</label>
                <input type="number" value={iKm} onChange={e=>setIKm(e.target.value)} placeholder={def?.iKm?String(def.iKm):'No aplica'}/>
              </div>
              <div>
                <label style={{fontSize:11,color:'var(--text-3)',display:'block',marginBottom:4}}>Cada N días</label>
                <input type="number" value={iDays} onChange={e=>setIDays(e.target.value)} placeholder={def?.iDays?String(def.iDays):'No aplica'}/>
              </div>
            </div>
            <div style={{marginBottom:12}}>
              <label style={{fontSize:11,color:'var(--text-3)',display:'block',marginBottom:6}}>Disparador de alerta</label>
              <div style={{display:'flex',gap:6}}>
                {[['both','El primero'],['km','Solo KM'],['time','Solo días']].map(([val,lbl])=>(
                  <button key={val} onClick={()=>setTrig(val)} style={{flex:1,padding:'7px 4px',fontSize:11,fontWeight:600,fontFamily:'Sora,sans-serif',borderRadius:'var(--radius-sm)',border:'none',cursor:'pointer',background:trig===val?'var(--accent)':'var(--bg-3)',color:trig===val?'#fff':'var(--text-2)',transition:'all .15s'}}>{lbl}</button>
                ))}
              </div>
            </div>
            {def&&<p style={{fontSize:11,color:'var(--text-3)',marginBottom:12}}>Por defecto: {def.iKm?`${def.iKm.toLocaleString('es-AR')} km`:''}{def.iKm&&def.iDays?' / ':''}{def.iDays?`${def.iDays} días`:''}</p>}
            <div style={{display:'flex',gap:8}}>
              <Btn onClick={()=>setEditId(null)} v="ghost" style={{flex:1,justifyContent:'center'}} sz="sm">Cancelar</Btn>
              <Btn onClick={save} style={{flex:1,justifyContent:'center'}} sz="sm">Guardar cambios</Btn>
            </div>
          </div>
        )}
      </div>
    );
  };

  return (
    <div style={{minHeight:'100vh',background:'var(--bg-0)',paddingBottom:90}}>
      <div style={{background:'var(--bg-1)',borderBottom:'1px solid var(--border)',padding:'16px 20px',display:'flex',alignItems:'center',gap:12,position:'sticky',top:0,zIndex:10}}>
        <button onClick={onBack} style={{background:'none',border:'none',color:'var(--text-2)',cursor:'pointer',fontSize:22,padding:'0 4px',lineHeight:1}}>←</button>
        <div>
          <h2 style={{fontSize:17,fontWeight:600}}>Personalizar intervalos</h2>
          <p style={{fontSize:11,color:'var(--text-3)',marginTop:1}}>{vehicle.brand} {vehicle.model}</p>
        </div>
      </div>
      <div style={{padding:'20px 16px'}}>
        <div style={{background:'var(--bg-2)',border:'1px solid var(--border)',borderRadius:'var(--radius-lg)',padding:'12px 14px',marginBottom:20}}>
          <p style={{fontSize:12,color:'var(--text-2)',lineHeight:1.5}}>Modificá cuándo querés que Autito Seco te avise para cada ítem. Los valores marcados como <span style={{color:'var(--accent)',fontWeight:700}}>CUSTOM</span> son los que cambiaste.</p>
        </div>
        {vehicle.maints.map(m=><MaintRow key={m.id} m={m}/>)}
      </div>
    </div>
  );
};

// ── VehicleDetailScreen ───────────────────────────────────────────────
const VehicleDetailScreen = ({vehicle, isFav, dispatch, onBack, onGoToDashboard, onDeleted}) => {
  const [km, setKm] = useState('');
  const [editing, setEditing] = useState(false);
  const [confirmDel, setConfirmDel] = useState(false);
  const [f, setF] = useState({brand:vehicle.brand, model:vehicle.model, year:String(vehicle.year), plate:vehicle.plate, color:vehicle.color});
  const ov = overallStatus(vehicle.maints, vehicle.km);
  const done = vehicle.maints.filter(m=>m.lastDate).length;
  const carColor = editing ? (f.color||'#7C6FFF') : (vehicle.color || '#7C6FFF');
  const setFv = (k,v) => setF(p=>({...p,[k]:v}));
  const validEdit = f.brand && f.model && f.plate && f.color;

  const saveEdit = () => {
    if (!validEdit) return;
    dispatch({type:'UPD_VEH', vid:vehicle.id, changes:{brand:f.brand, model:f.model, year:Number(f.year), plate:f.plate, color:f.color}});
    setEditing(false);
  };
  const deleteVehicle = () => {
    dispatch({type:'DEL_VEH', id:vehicle.id});
    onDeleted();
  };

  return (
    <div style={{minHeight:'100vh',background:'var(--bg-0)',paddingBottom:90}}>
      <div style={{background:'var(--bg-1)',borderBottom:'1px solid var(--border)',padding:'16px 20px',display:'flex',alignItems:'center',justifyContent:'space-between',position:'sticky',top:0,zIndex:10}}>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <button onClick={onBack} style={{background:'none',border:'none',color:'var(--text-2)',cursor:'pointer',fontSize:22,padding:'0 4px',lineHeight:1}}>←</button>
          <h2 style={{fontSize:17,fontWeight:600}}>{vehicle.brand} {vehicle.model}</h2>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          {isFav?<span style={{fontSize:18}}>⭐</span>:<button onClick={()=>dispatch({type:'SET_FAV',id:vehicle.id})} style={{background:'var(--bg-3)',border:'1px solid var(--border)',borderRadius:'var(--radius-sm)',color:'var(--text-2)',fontSize:12,fontWeight:600,padding:'5px 10px',cursor:'pointer',fontFamily:'Sora,sans-serif'}}>☆ Marcar favorito</button>}
          {!editing&&<button onClick={()=>{setF({brand:vehicle.brand,model:vehicle.model,year:String(vehicle.year),plate:vehicle.plate,color:vehicle.color});setEditing(true);}} style={{background:'var(--bg-3)',border:'1px solid var(--border)',color:'var(--text-2)',borderRadius:'var(--radius-sm)',padding:'6px 10px',fontSize:12,fontWeight:600,cursor:'pointer',fontFamily:'Sora,sans-serif'}}>✏ Editar</button>}
        </div>
      </div>
      <div style={{padding:'24px 20px'}}>
        <div style={{display:'flex',justifyContent:'center',marginBottom:20}}><CarSVG c={carColor}/></div>

        {editing ? (
          <div style={{background:'var(--bg-2)',border:'1px solid var(--accent)',borderRadius:'var(--radius-xl)',padding:'20px',marginBottom:16}}>
            <h3 style={{fontSize:15,fontWeight:600,marginBottom:14}}>Editar datos del vehículo</h3>
            {[{k:'brand',l:'Marca'},{k:'model',l:'Modelo'},{k:'year',l:'Año',t:'number'},{k:'plate',l:'Patente'}].map(ff=>(
              <div key={ff.k} style={{marginBottom:12}}>
                <label style={{fontSize:12,color:'var(--text-3)',display:'block',marginBottom:5,fontWeight:500}}>{ff.l}</label>
                <input type={ff.t||'text'} value={f[ff.k]} onChange={e=>setFv(ff.k,e.target.value)}/>
              </div>
            ))}
            <div style={{marginBottom:16}}><ColorPicker value={f.color} onChange={v=>setFv('color',v)}/></div>
            <div style={{display:'flex',gap:10}}>
              <Btn onClick={()=>setEditing(false)} v="ghost" style={{flex:1,justifyContent:'center'}}>Cancelar</Btn>
              <Btn onClick={saveEdit} disabled={!validEdit} style={{flex:1,justifyContent:'center'}}>Guardar</Btn>
            </div>
          </div>
        ) : (
          <div style={{background:'var(--bg-2)',border:'1px solid var(--border)',borderRadius:'var(--radius-xl)',padding:'20px',marginBottom:16}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
              <h3 style={{fontSize:15,fontWeight:600}}>Datos del vehículo</h3>
              <Badge color={ov.color} label={ov.label}/>
            </div>
            {[['Marca / Modelo',`${vehicle.brand} ${vehicle.model}`,false],['Año',vehicle.year,false],['Patente',vehicle.plate.toUpperCase(),true],['Kilometraje',`${Number(vehicle.km).toLocaleString('es-AR')} km`,true],['Color',CAR_COLORS.find(c=>c.hex===vehicle.color)?.name||vehicle.color||'—',false]].map(([l,v,mono])=>(
              <div key={l} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:'1px solid var(--border)'}}>
                <span style={{fontSize:13,color:'var(--text-3)'}}>{l}</span>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  {l==='Color'&&vehicle.color&&<div style={{width:14,height:14,borderRadius:'50%',background:vehicle.color,border:'1px solid rgba(255,255,255,.2)'}}/>}
                  <span style={{fontSize:13,fontWeight:700,fontFamily:mono?'Space Mono':'Sora'}}>{v}</span>
                </div>
              </div>
            ))}
            <div style={{marginTop:12}}>
              <p style={{fontSize:11,color:'var(--text-3)',marginBottom:4}}>Revisiones completadas</p>
              <p style={{fontFamily:'Space Mono',fontSize:22,fontWeight:700}}>{done}<span style={{fontSize:13,color:'var(--text-3)',fontFamily:'Sora'}}>/{vehicle.maints.length}</span></p>
            </div>
          </div>
        )}

        <div style={{background:'var(--bg-2)',border:'1px solid var(--border)',borderRadius:'var(--radius-xl)',padding:'20px',marginBottom:16}}>
          <h3 style={{fontSize:14,fontWeight:600,marginBottom:12}}>Actualizar kilometraje</h3>
          <div style={{display:'flex',gap:10}}>
            <input type="number" value={km} onChange={e=>setKm(e.target.value)} placeholder={`Actual: ${Number(vehicle.km).toLocaleString('es-AR')} km`} style={{flex:1}}/>
            <Btn onClick={()=>{if(Number(km)>0){dispatch({type:'UPD_KM',vid:vehicle.id,km:Number(km)});setKm('');}}} disabled={!km||Number(km)<=0}>OK</Btn>
          </div>
        </div>

        <Btn onClick={()=>{ dispatch({type:'SET_FAV',id:vehicle.id}); onGoToDashboard(); }} style={{width:'100%',justifyContent:'center',marginBottom:16}} sz="lg">
          {isFav?'Ver en dashboard →':'Ir al dashboard con este auto →'}
        </Btn>

        {confirmDel ? (
          <div style={{background:'var(--red-dim)',border:'1px solid rgba(232,90,74,.25)',borderRadius:'var(--radius-xl)',padding:'18px'}}>
            <p style={{fontSize:13,color:'var(--red)',fontWeight:600,marginBottom:4}}>¿Eliminar {vehicle.brand} {vehicle.model}?</p>
            <p style={{fontSize:12,color:'var(--text-2)',marginBottom:14}}>Se borra también su historial y las visitas al taller. No se puede deshacer.</p>
            <div style={{display:'flex',gap:10}}>
              <Btn onClick={()=>setConfirmDel(false)} v="ghost" style={{flex:1,justifyContent:'center'}}>Cancelar</Btn>
              <Btn onClick={deleteVehicle} v="danger" style={{flex:1,justifyContent:'center'}}>Sí, eliminar</Btn>
            </div>
          </div>
        ) : (
          <button onClick={()=>setConfirmDel(true)} style={{width:'100%',background:'none',border:'none',color:'var(--red)',fontSize:12,fontWeight:600,padding:'8px',cursor:'pointer',fontFamily:'DM Sans,sans-serif',textDecoration:'underline',textDecorationStyle:'dotted'}}>Eliminar vehículo</button>
        )}
      </div>
    </div>
  );
};

// ── App ───────────────────────────────────────────────────────────────
const App = () => {
  const [state,   rawDispatch] = useReducer(reducer, null, ()=>load()||initState());
  const [screen,  setScreen] = useState('home');
  const [addingV, setAddingV]= useState(false);
  const [authChecked, setAuthChecked] = useState(false);
  const [dataLoaded, setDataLoaded] = useState(false);
  const [pendingSync, setPendingSync] = useState(0);
  const [online, setOnline] = useState(navigator.onLine);
  const [toast, setToast] = useState('');
  useEffect(()=>save(state),[state]);

  useEffect(() => {
    const goOnline = () => setOnline(true);
    const goOffline = () => setOnline(false);
    window.addEventListener('online', goOnline);
    window.addEventListener('offline', goOffline);
    return () => { window.removeEventListener('online', goOnline); window.removeEventListener('offline', goOffline); };
  }, []);

  const showToast = useCallback((msg) => {
    setToast(msg);
    setTimeout(() => setToast(t => t===msg ? '' : t), 4000);
  }, []);

  // Envuelve una promesa de Supabase: cuenta como "sincronizando" mientras está en vuelo
  // y muestra un toast amigable si falla (en vez del alert() nativo de antes).
  const track = useCallback((promise, failMsg) => {
    setPendingSync(n=>n+1);
    return promise
      .catch(err => { console.error(failMsg, err); showToast(failMsg + (online?'.':' — estás sin conexión.')); throw err; })
      .finally(() => setPendingSync(n=>Math.max(0,n-1)));
  }, [online, showToast]);

  // dispatch envuelve rawDispatch: actualiza local al instante y persiste en Supabase en segundo plano.
  // ADD_VEH/ADD_DOC/ADD_WORK insertan primero en la nube (para usar el id real) y recién ahí actualizan local.
  const dispatch = useCallback((action) => {
    const uid = state.user?.id;

    if (action.type === 'ADD_VEH' && uid) {
      const maints = MAINTS_DEFAULT.map(m=>({...m}));
      track(supabase.from('vehicles').insert({
        user_id:uid, brand:action.v.brand, model:action.v.model, year:action.v.year,
        plate:action.v.plate, km:action.v.km, color:action.v.color,
        added_date:action.v.addedDate, maints, is_favorite:state.vehicles.length===0,
      }).select().single(), 'No se pudo guardar el vehículo').then(({data}) => {
        rawDispatch({ type:'ADD_VEH', v:{ ...action.v, id:data.id, maints } });
      }).catch(() => {});
      return;
    }
    if (action.type === 'ADD_DOC' && uid) {
      track(supabase.from('documents').insert({
        user_id:uid, name:action.doc.name, type:action.doc.type,
        date:action.doc.date || null, added_at:action.doc.addedAt,
      }).select().single(), 'No se pudo guardar el documento').then(({data}) => {
        rawDispatch({ type:'ADD_DOC', doc:{ ...action.doc, id:data.id } });
      }).catch(() => {});
      return;
    }
    if (action.type === 'ADD_WORK' && uid) {
      track(supabase.from('workshop_entries').insert({
        user_id:uid, vehicle_id:action.entry.vid, date:action.entry.date || null,
        place:action.entry.place, person:action.entry.person, phone:action.entry.phone,
        description:action.entry.description, result:action.entry.result,
        cost:action.entry.cost, created_at:action.entry.createdAt,
      }).select().single(), 'No se pudo guardar la visita').then(({data}) => {
        rawDispatch({ type:'ADD_WORK', entry:{ ...action.entry, id:data.id } });
      }).catch(() => {});
      return;
    }

    rawDispatch(action);
    if (!uid) return;

    switch (action.type) {
      case 'SET_FAV':
        track(supabase.from('vehicles').update({ is_favorite:false }).eq('user_id', uid)
          .then(() => supabase.from('vehicles').update({ is_favorite:true }).eq('id', action.id)), 'No se pudo guardar el favorito').catch(()=>{});
        break;
      case 'UPD_KM':
        track(supabase.from('vehicles').update({ km:action.km }).eq('id', action.vid), 'No se pudo guardar el kilometraje').catch(()=>{});
        break;
      case 'UPD_VEH':
        track(supabase.from('vehicles').update(action.changes).eq('id', action.vid), 'No se pudo guardar los datos del vehículo').catch(()=>{});
        break;
      case 'DEL_VEH':
        track(supabase.from('vehicles').delete().eq('id', action.id), 'No se pudo eliminar el vehículo').catch(()=>{});
        break;
      case 'APPLY': {
        const vehicle = state.vehicles.find(v=>v.id===action.vid);
        const maints = vehicle.maints.map(m=>m.id===action.mid?{...m,lastKm:action.km,lastDate:action.date,lastProduct:action.product||m.lastProduct||''}:m);
        track(supabase.from('vehicles').update({ maints }).eq('id', action.vid), 'No se pudo guardar la revisión').catch(()=>{});
        track(supabase.from('history').insert({ user_id:uid, vehicle_id:action.vid, mid:action.mid, km:action.km, date:action.date, product:action.product||'' }), 'No se pudo guardar el historial').catch(()=>{});
        break;
      }
      case 'TOGGLE_CAT': {
        const vehicle = state.vehicles.find(v=>v.id===action.vid);
        const maints = vehicle.maints.map(m=>m.id===action.mid?{...m,cat:m.cat==='monthly'?'service':'monthly'}:m);
        track(supabase.from('vehicles').update({ maints }).eq('id', action.vid), 'No se pudo mover el ítem').catch(()=>{});
        break;
      }
      case 'UPD_MAINT_INTERVAL': {
        const vehicle = state.vehicles.find(v=>v.id===action.vid);
        const maints = vehicle.maints.map(m=>m.id===action.mid?{...m,...action.changes}:m);
        track(supabase.from('vehicles').update({ maints }).eq('id', action.vid), 'No se pudo guardar el intervalo').catch(()=>{});
        break;
      }
      case 'DEL_DOC':
        track(supabase.from('documents').delete().eq('id', action.id), 'No se pudo borrar el documento').catch(()=>{});
        break;
      case 'UPD_WORK':
        track(supabase.from('workshop_entries').update({
          date:action.entry.date || null, place:action.entry.place, person:action.entry.person,
          phone:action.entry.phone, description:action.entry.description, result:action.entry.result,
          cost:action.entry.cost,
        }).eq('id', action.entry.id), 'No se pudo guardar la visita').catch(()=>{});
        break;
      case 'DEL_WORK':
        track(supabase.from('workshop_entries').delete().eq('id', action.id), 'No se pudo borrar la visita').catch(()=>{});
        break;
    }
  }, [state, track]);

  useEffect(() => {
    supabase.auth.getSession().then(({data:{session}}) => {
      if (session?.user) rawDispatch({type:'LOGIN', user:sessionToUser(session.user)});
      setAuthChecked(true);
    });
    const { data:sub } = supabase.auth.onAuthStateChange((_event, session) => {
      if (session?.user) rawDispatch({type:'LOGIN', user:sessionToUser(session.user)});
      else rawDispatch({type:'RESET'});
    });
    return () => sub.subscription.unsubscribe();
  }, []);

  // Al loguearse, trae los datos reales desde Supabase y pisa lo que hubiera en localStorage.
  // Espera a authChecked: state.user puede venir ya seteado desde el cache de localStorage
  // antes de que Supabase termine de restaurar la sesión real, y consultar la nube en ese
  // instante (sin token todavía aplicado) devuelve 0 filas por RLS, sin error.
  useEffect(() => {
    if (!authChecked || !state.user) { setDataLoaded(false); return; }
    let active = true;
    fetchCloudData(state.user.id).then(cloud => {
      if (!active) return;
      rawDispatch({ type:'HYDRATE', ...cloud });
      setDataLoaded(true);
    }).catch(err => { console.error('fetchCloudData', err); setDataLoaded(true); });
    return () => { active = false; };
  }, [authChecked, state.user?.id]);

  const logout=()=>{ supabase.auth.signOut(); rawDispatch({type:'RESET'}); setScreen('home'); setAddingV(false); };

  const Loading = () => <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg-0)'}}><Icon id="car" size={32} color="var(--green)"/></div>;

  const StatusBanners = () => (
    <>
      {!online && (
        <div style={{position:'fixed',top:0,left:0,right:0,zIndex:200,background:'var(--amber-dim)',borderBottom:'1px solid rgba(232,200,74,.25)',color:'var(--amber)',fontSize:12,fontWeight:600,textAlign:'center',padding:'8px 12px'}}>
          Sin conexión — los cambios se van a guardar cuando vuelva internet
        </div>
      )}
      {online && pendingSync>0 && (
        <div style={{position:'fixed',top:0,left:0,right:0,zIndex:199,background:'var(--bg-3)',borderBottom:'1px solid var(--border)',color:'var(--text-2)',fontSize:12,fontWeight:600,textAlign:'center',padding:'6px 12px'}}>
          Guardando…
        </div>
      )}
      {toast && (
        <div style={{position:'fixed',bottom:90,left:16,right:16,zIndex:200,background:'var(--red-dim)',border:'1px solid rgba(232,90,74,.25)',color:'var(--red)',fontSize:13,fontWeight:600,textAlign:'center',padding:'12px 16px',borderRadius:'var(--radius-lg)'}}>
          {toast}
        </div>
      )}
    </>
  );

  if (!authChecked) return <Loading/>;
  if (!state.user) return <Login onLogin={u=>rawDispatch({type:'LOGIN',user:u})}/>;
  if (!dataLoaded) return <Loading/>;
  if (state.vehicles.length===0&&!addingV)
    return <><StatusBanners/><VehicleForm title="Configuración inicial" subtitle={`Hola ${state.user.name} 👋 Configuremos el historial de tu auto.`}
      onComplete={v=>dispatch({type:'ADD_VEH',v})}/></>;
  if (addingV)
    return <><StatusBanners/><VehicleForm onCancel={()=>setAddingV(false)} title="Agregar vehículo"
      onComplete={v=>{ dispatch({type:'ADD_VEH',v}); setAddingV(false); setScreen('profile'); }}/></>;

  const favVehicle = state.vehicles.find(v=>v.id===state.favoriteVehicleId)||state.vehicles[0];

  return (
    <div style={{maxWidth:480,margin:'0 auto',position:'relative'}}>
      <StatusBanners/>
      {screen==='home'     && <Dashboard state={state} dispatch={dispatch} vehicle={favVehicle} vehicles={state.vehicles} onNav={setScreen}/>}
      {screen==='workshop' && <Workshop  state={state} dispatch={dispatch} vehicle={favVehicle}/>}
      {screen==='history'  && <History   state={state} vehicle={favVehicle}/>}
      {screen==='docs'     && <Documents state={state} dispatch={dispatch}/>}
      {screen==='profile'  && <Profile   state={state} dispatch={dispatch} onLogout={logout} onAddVehicle={()=>setAddingV(true)} onNav={setScreen}/>}
      <Nav active={screen} onNav={setScreen}/>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').then(reg => {
      // Revisa si hay una versión nueva apenas se abre la app.
      reg.update().catch(() => {});
    }).catch(() => {});

    // sw.js ya hace skipWaiting() + clients.claim(), así que en cuanto el
    // navegador instala una versión nueva, esta toma control solo. Cuando eso
    // pasa, recargamos automáticamente para que la pestaña abierta tome la
    // versión nueva sin que el usuario tenga que desinstalar/reinstalar nada.
    let refreshed = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (refreshed) return;
      refreshed = true;
      window.location.reload();
    });
  });
}
</script>
</body>
</html>
